services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: shopez-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${SA_PASSWORD:-Your_password123}"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  userservice:
    build:
      context: .
      dockerfile: ShopEZ.UserService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__UserDb: "Server=sqlserver,1433;Database=ShopEZ_UserDb;User Id=sa;Password=${SA_PASSWORD:-Your_password123};TrustServerCertificate=True;Encrypt=False;"
      Jwt__Issuer: "${JWT_ISSUER:-ShopEZ.Issuer}"
      Jwt__Audience: "${JWT_AUDIENCE:-ShopEZ.Client}"
      Jwt__Key: "${JWT_KEY:-ShopEZ_SuperSecret_Development_Key_2026}"
    depends_on:
      - sqlserver

  productservice:
    build:
      context: .
      dockerfile: ShopEZ.ProductService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__ProductDb: "Server=sqlserver,1433;Database=ShopEZ_ProductDb;User Id=sa;Password=${SA_PASSWORD:-Your_password123};TrustServerCertificate=True;Encrypt=False;"
      InternalServiceKey: "${INTERNAL_SERVICE_KEY:-ShopEZ_Internal_Stock_Key_2026}"
      Jwt__Issuer: "${JWT_ISSUER:-ShopEZ.Issuer}"
      Jwt__Audience: "${JWT_AUDIENCE:-ShopEZ.Client}"
      Jwt__Key: "${JWT_KEY:-ShopEZ_SuperSecret_Development_Key_2026}"
    depends_on:
      - sqlserver

  cartservice:
    build:
      context: .
      dockerfile: ShopEZ.CartService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__CartDb: "Server=sqlserver,1433;Database=ShopEZ_CartDb;User Id=sa;Password=${SA_PASSWORD:-Your_password123};TrustServerCertificate=True;Encrypt=False;"
      Jwt__Issuer: "${JWT_ISSUER:-ShopEZ.Issuer}"
      Jwt__Audience: "${JWT_AUDIENCE:-ShopEZ.Client}"
      Jwt__Key: "${JWT_KEY:-ShopEZ_SuperSecret_Development_Key_2026}"
    depends_on:
      - sqlserver

  orderservice:
    build:
      context: .
      dockerfile: ShopEZ.OrderService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__OrderDb: "Server=sqlserver,1433;Database=ShopEZ_OrderDb;User Id=sa;Password=${SA_PASSWORD:-Your_password123};TrustServerCertificate=True;Encrypt=False;"
      ServiceUrls__ProductService: "http://productservice:8080"
      ServiceAuth__InternalServiceKey: "${INTERNAL_SERVICE_KEY:-ShopEZ_Internal_Stock_Key_2026}"
      Jwt__Issuer: "${JWT_ISSUER:-ShopEZ.Issuer}"
      Jwt__Audience: "${JWT_AUDIENCE:-ShopEZ.Client}"
      Jwt__Key: "${JWT_KEY:-ShopEZ_SuperSecret_Development_Key_2026}"
    depends_on:
      - sqlserver
      - productservice

  apigateway:
    build:
      context: .
      dockerfile: "ShopEZ.API Gateway/Dockerfile"
    ports:
      - "7201:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Jwt__Issuer: "${JWT_ISSUER:-ShopEZ.Issuer}"
      Jwt__Audience: "${JWT_AUDIENCE:-ShopEZ.Client}"
      Jwt__Key: "${JWT_KEY:-ShopEZ_SuperSecret_Development_Key_2026}"
    depends_on:
      - userservice
      - productservice
      - cartservice
      - orderservice

  frontend:
    build:
      context: "./Frontend Angular"
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    environment:
      API_BASE_URL: "http://localhost:7201"
    depends_on:
      - apigateway

volumes:
  sql_data:
